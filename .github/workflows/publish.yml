name: publish
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        default: false
        type: boolean
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: npm i -fg corepack && corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install
      - run: pnpm test
      - run: pnpm build
      - name: Read version from package.json
        id: version
        run: echo "tag=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance --tag ${{ steps.version.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: echo "Published vuemark@${{ steps.version.outputs.tag }}"
